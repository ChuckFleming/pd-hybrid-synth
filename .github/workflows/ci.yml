name: CI

# Build the plugin and run the DSP test suite on every push and pull request,
# across all three desktop platforms.
on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-14
            name: macOS
          - os: ubuntu-latest
            name: Linux
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev libx11-dev libxext-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libfreetype6-dev \
            libglu1-mesa-dev libcurl4-openssl-dev libwebkit2gtk-4.1-dev \
            pkg-config ninja-build

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
